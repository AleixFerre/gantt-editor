<section class="login">
  <form [formGroup]="form" (ngSubmit)="submit()" class="login__card" novalidate>
    <h1 class="login__title">Sign in</h1>
    <p class="login__subtitle">Enter your credentials to continue.</p>

    <label class="login__field">
      <span class="login__label">Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="you@example.com"
      />
    </label>

    <label class="login__field">
      <span class="login__label">Password</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="current-password"
        placeholder="••••••••"
      />
    </label>

    <button
      type="submit"
      class="login__btn"
      [disabled]="form.invalid"
    >
      Sign in
    </button>

    <a class="login__link" routerLink="/">Back to gantt</a>
  </form>
</section>
